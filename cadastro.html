<!DOCTYPE html>

<body>

<header>

<h1 class="textomenor">Inscreva-se neste site:</h1>

<form class="formulario" id="formCadastro" onsubmit="enviarForm(event)">

    <div id="mensagemErro" class="mensagem erro" style="display: none;"></div>
    <div id="mensagemSucesso" class="mensagem sucesso" style="display: none;"></div>

    <div class="campo">
        <label for="nome">Nome e Sobrenome:</label>
        <input type="text" id="nome" name="name" placeholder="Digite seu nome completo">
    </div>

    <div class="campo">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="phone" placeholder="00 00000-0000">
    </div>

    <div class="campo">
        <label for="CEP">CEP:</label>
        <input type="text" id="CEP" name="cep" placeholder="00000-000">
    </div>

    <div class="campo">
        <label for="mail">E-mail:</label>
        <input type="email" id="mail" name="email" placeholder="email@exemplo.com">
    </div>

    <div class="campo">
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres">
    </div>

    <div class="campo">
        <label for="confirmarSenha">Confirmar senha:</label>
        <input type="password" id="confirmarSenha" name="senhaAlt" placeholder="Repita a senha">
    </div>

    <button type="submit">Cadastrar</button>

</form>

<script src="script.js"></script>

</body>
</html>
